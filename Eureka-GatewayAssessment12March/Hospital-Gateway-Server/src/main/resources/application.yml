
spring:
  application:
    name: GATEWAY-SERVICE
  cloud:
    gateway:
      routes:
        - id: patient-service
          uri: lb://PATIENT-SERVICE
          predicates:
            - Path=/patient/**
        - id: dector-service
          uri: lb://DOCTOR-SERVICE
          predicates:
            - Path=/doctor/**
        - id: patient-service
          uri: lb://APPOINTMENT-SERVICE
          predicates:
            - Path=/appoint/**



eureka:
  client:
    register-with-eureka: true
    fetchRegistry: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka
  instance:
    hostname: localhost

server:
  port: 8889